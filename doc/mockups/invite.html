<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendMyMail — Accept invite</title>
<link rel="stylesheet" href="_shared.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card single" style="max-width:500px;">
    <div class="auth-form">
      <div class="logo"><span class="mark">S</span> SendMyMail</div>
      <div style="display:flex;align-items:center;gap:12px;background:var(--primary-light);border:1px solid #D9D5F7;border-radius:12px;padding:14px;margin-bottom:20px;">
        <div class="av av-md" style="background:linear-gradient(150deg,#7A71D8,#4B43A8);">N</div>
        <div><div style="font-size:11px;color:var(--primary-dark);text-transform:uppercase;letter-spacing:.04em;font-weight:600;">You've been invited</div><div style="font-weight:600;margin-top:1px;">Join Nirvana Agency</div><div style="font-size:12px;color:var(--muted);margin-top:3px;">Prasiddha invited you as a <span class="pill purple">Member</span></div></div>
      </div>
      <h2 style="font-size:20px;">Create your account</h2>
      <p class="subtitle">You'll join Nirvana Agency once you finish setup.</p>
      <div class="field"><label class="label">Your name</label><input class="input" placeholder="Sushmita Karki"></div>
      <div class="field"><label class="label">Email (can't be changed)</label><input class="input" value="sushmita@nirvanaagency.com" disabled style="background:var(--surface);color:var(--muted);"></div>
      <div class="field"><label class="label">Set a password</label><input class="input" type="password" value="************"></div>
      <label class="checkbox" style="margin-bottom:16px;"><input type="checkbox" checked> I agree to the <a class="auth-link">Terms</a> &amp; <a class="auth-link">Privacy Policy</a></label>
      <button class="btn btn-primary btn-block btn-lg" onclick="location.href='agency_dashboard.html'">Join Nirvana Agency</button>
    </div>
  </div>
</div>
</body>
</html>
